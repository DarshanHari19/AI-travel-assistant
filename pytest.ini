[pytest]
# Pytest configuration for Strategic Business Travel Assistant

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Coverage options (if pytest-cov is installed)
# --cov=.
# --cov-report=html
# --cov-report=term-missing

# Markers for different test types
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require real API keys)
    performance: Performance and load tests
    slow: Tests that take a long time to run

# Asyncio configuration
asyncio_mode = auto

# Test paths
testpaths = .

# Ignore patterns
norecursedirs = 
    .git
    .venv
    venv
    env
    __pycache__
    node_modules
    dist
    build

# Environment variables for testing
env = 
    OPENAI_API_KEY=sk-test-key-1234567890
    OPENWEATHER_API_KEY=test-weather-key-1234567890
