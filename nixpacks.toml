[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools"]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install -r backend-agent/requirements.txt"
]

[start]
cmd = "cd backend-agent && python -m uvicorn agent:app --host 0.0.0.0 --port $PORT"
