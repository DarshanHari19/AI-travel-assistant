version: '3.8'

services:
  backend:
    build: 
      context: ./backend-agent
      dockerfile: Dockerfile
    container_name: travel-assistant-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend-agent/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend-agent:/app
      - ./mcp-server:/app/mcp-server
    depends_on:
      - mcp-server
    networks:
      - travel-assistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: travel-assistant-mcp
    env_file:
      - ./mcp-server/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./mcp-server:/app
    networks:
      - travel-assistant-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-assistant-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - travel-assistant-network
    restart: unless-stopped

networks:
  travel-assistant-network:
    driver: bridge

volumes:
  backend-data:
  frontend-data:
